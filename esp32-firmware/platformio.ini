[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

# SOLUCIÓN DE HARDWARE: Desviar las interrupciones del IR al Timer 3 para que no choquen con el WiFi/System
build_flags = 
    -D IR_USE_TIMER3

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    nRF24/RF24@^1.4.8
    adafruit/Adafruit PN532@^1.3.4
    crankyoldgit/IRremoteESP8266@^2.8.6
    LSatan/SmartRC-CC1101-Driver-Lib@^2.5.7
    h2zero/NimBLE-Arduino@^1.4.2
